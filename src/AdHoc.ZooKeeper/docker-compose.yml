services:
  zookeeper1:
    image: zookeeper:latest
    container_name: zookeeper1
    hostname: zookeeper1
    environment:
      # The unique ID of this ZooKeeper server
      ZOO_MY_ID: 1
      # List all servers in the ensemble
      ZOO_SERVERS: "server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181"
      # Disable standalone mode so that it starts in clustered mode
      ZOO_STANDALONE_ENABLED: "false"
      # Extra configuration to enable digest auth
      ZOO_CFG_EXTRA: |
        requireClientAuthScheme=digest
        authProvider.1=org.apache.zookeeper.server.auth.DigestAuthenticationProvider
        # Example super user (NOT recommended in plain text for production)
        superDigest=super:superpwd
      ZOO_LOG4J_PROP: "DEBUG,CONSOLE"
    ports:
      - "2181:2181"  # Client port
      - "2888:2888"  # Follower connections
      - "3888:3888"  # Leader election
    networks:
      - zookeeper-net

  zookeeper2:
    image: zookeeper:latest
    container_name: zookeeper2
    hostname: zookeeper2
    environment:
      ZOO_MY_ID: 2
      ZOO_SERVERS: "server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181"
      ZOO_STANDALONE_ENABLED: "false"
      ZOO_CFG_EXTRA: |
        requireClientAuthScheme=digest
        authProvider.1=org.apache.zookeeper.server.auth.DigestAuthenticationProvider
        superDigest=super:superpwd
      ZOO_LOG4J_PROP: "DEBUG,CONSOLE"
    ports:
      - "2182:2181"  # Client port
    networks:
      - zookeeper-net

  zookeeper3:
    image: zookeeper:latest
    container_name: zookeeper3
    hostname: zookeeper3
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: "server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181"
      ZOO_STANDALONE_ENABLED: "false"
      ZOO_CFG_EXTRA: |
        requireClientAuthScheme=digest
        authProvider.1=org.apache.zookeeper.server.auth.DigestAuthenticationProvider
        superDigest=super:superpwd
      ZOO_LOG4J_PROP: "DEBUG,CONSOLE"
    ports:
      - "2183:2181"  # Client port
    networks:
      - zookeeper-net

networks:
  zookeeper-net:
    driver: bridge
